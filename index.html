<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>主页</title>
<style>
    /* 重置默认样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 全屏渐变动画背景 */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c, #4facfe, #00f2fe);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* 背景渐变动画关键帧 */
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 浮动粒子装饰 */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* 主内容卡片 */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 80px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
      animation: fadeInUp 0.8s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 标题样式 */
    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    /* 副标题样式 */
    p {
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.8;
      max-width: 480px;
      margin: 0 auto 32px;
    }

    /* 按钮样式 */
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: rgba(255, 255, 255, 0.25);
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }
  </style>

<!-- 引入对话气泡工具 -->
<script src="https://pre-yf-autoagent.pre-opt.aliyun.com/bubble-popup.min.js"></script>
    <link rel="manifest" href="./manifest.webmanifest">
    <meta name="theme-color" content="#B13BFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="test">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
</head>
<body>
<!-- 浮动粒子背景 -->
<div class="particles" id="particles"></div>
<!-- 主内容卡片 -->
<div class="card">
<h1>✨ 欢迎来到主页</h1>
<p>这是一个拥有动态渐变背景的主页，简洁而充满活力。</p>
<a class="btn" href="#">开始探索</a>
</div>
<script>
    // 动态生成浮动粒子
    const container = document.getElementById('particles');
    const count = 18;

    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const size = Math.random() * 60 + 20; // 20px ~ 80px
      el.style.cssText = [
        `width: ${size}px`,
        `height: ${size}px`,
        `left: ${Math.random() * 100}%`,
        `animation-duration: ${Math.random() * 12 + 8}s`,
        `animation-delay: ${Math.random() * 10}s`,
      ].join(';');
      container.appendChild(el);
    }
  </script>
    <script>
        // PWA Service Worker 注册 - 由 setup_pwa.py 自动生成
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then((reg) => {
                    console.log('[PWA] Service Worker 已注册, scope:', reg.scope);
                    return navigator.serviceWorker.ready;
                })
                .then(() => console.log('[PWA] Service Worker 已激活并接管页面'))
                .catch((err) => console.warn('[PWA] Service Worker 注册失败:', err));
        } else {
            console.warn('[PWA] 当前环境不支持 Service Worker（需要 HTTPS 或 localhost）');
        }
    </script>
</body>
</html>
